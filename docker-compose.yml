version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: salon-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: salon_db
      POSTGRES_INITDB_ARGS: "--auth-host=md5"
    ports:
      - "5434:5432"
    volumes:
      - salon_pg_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
    networks:
      - salon-network

  redis:
    image: redis:7-alpine
    container_name: salon-redis
    command: >
      redis-server
      --requirepass salon_redis_secret
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - salon_redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "salon_redis_secret", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    networks:
      - salon-network

networks:
  salon-network:
    driver: bridge

volumes:
  salon_pg_data:
  salon_redis_data:
