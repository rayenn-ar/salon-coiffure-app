name: CI — Salon de Coiffure

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'

# ==================== Jobs ====================

jobs:
  # --------------------------------------------------------------------------
  # 1. Backend — TypeScript type-check + lint + security audit
  # --------------------------------------------------------------------------
  backend-quality:
    name: Backend — TypeScript & Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: TypeScript type-check
        run: npx tsc --noEmit

  # --------------------------------------------------------------------------
  # 2. Frontend — TypeScript type-check + lint + security audit
  # --------------------------------------------------------------------------
  frontend-quality:
    name: Frontend — TypeScript & Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type-check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

  # --------------------------------------------------------------------------
  # 3. Security audit — high/critical CVEs in both packages
  # --------------------------------------------------------------------------
  security:
    name: Security — npm audit
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Audit backend
        working-directory: backend
        run: |
          npm ci
          npm audit --audit-level=high --omit=dev

      - name: Audit frontend
        working-directory: frontend
        run: |
          npm ci
          npm audit --audit-level=high --omit=dev

  # --------------------------------------------------------------------------
  # 4. E2E tests (Playwright) — run against a full Docker Compose stack
  # --------------------------------------------------------------------------
  e2e:
    name: E2E — Playwright
    runs-on: ubuntu-latest
    needs: [backend-quality, frontend-quality]

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: salon
          POSTGRES_PASSWORD: salon_password
          POSTGRES_DB: salon_coiffure
        ports:
          - 5434:5432
        options: >-
          --health-cmd="pg_isready -U salon"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      redis:
        image: redis:7-alpine
        command: redis-server --requirepass salon_redis_secret
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli -a salon_redis_secret ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      DATABASE_URL: postgresql://salon:salon_password@localhost:5434/salon_coiffure
      REDIS_URL: redis://:salon_redis_secret@localhost:6379
      JWT_PRIVATE_KEY_PATH: ./keys/private.pem
      JWT_PUBLIC_KEY_PATH: ./keys/public.pem
      NODE_ENV: test
      PORT: 3001
      FRONTEND_URL: http://localhost:3000

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Generate JWT keys
        working-directory: backend
        run: |
          mkdir -p keys
          openssl genrsa -out keys/private.pem 2048
          openssl rsa -in keys/private.pem -pubout -out keys/public.pem

      - name: Install backend deps
        working-directory: backend
        run: npm ci

      - name: Generate Prisma client & push schema
        working-directory: backend
        run: |
          npx prisma generate
          npx prisma db push --skip-generate
          npx prisma db seed

      - name: Start backend
        working-directory: backend
        run: npm start &
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
          REDIS_URL: ${{ env.REDIS_URL }}

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Build & start frontend
        working-directory: frontend
        run: |
          npm run build
          npm start &
        env:
          NEXT_PUBLIC_API_URL: http://localhost:3001

      - name: Wait for services to be ready
        run: |
          npx wait-on http://localhost:3001/health http://localhost:3000 --timeout 60000

      - name: Install Playwright browsers
        working-directory: e2e-tests
        run: |
          npm ci
          npx playwright install --with-deps chromium

      - name: Run Playwright tests
        working-directory: e2e-tests
        run: npx playwright test

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e-tests/playwright-report/
          retention-days: 7
